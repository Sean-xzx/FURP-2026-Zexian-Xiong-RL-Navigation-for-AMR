world:
  height: 10
  width: 10
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  control_mode: auto
  collision_mode: stop

robot:
  - kinematics:
      name: diff
    shape:
      name: circle
      radius: 0.2
    state: [1, 1, 0]
    goal: [9, 9, 0]
    color: g
    plot:
      show_trajectory: true
      show_goal: true

obstacle:
  - shape:
      name: circle
      radius: 0.5
    state: [5, 5, 0]
    color: k

  - shape:
      name: rectangle
      length: 1.5
      width: 0.3
    state: [4, 7, 0]
    color: k
